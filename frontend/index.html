<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <title>DrivePoints</title>
    <script>
      (function () {
        var path = window.location.pathname;
        var publicRoutes = ['/', '/about', '/login', '/register'];
        var isPublic = false;
        for (var i = 0; i < publicRoutes.length; i++) {
          if (path === publicRoutes[i]) { isPublic = true; break; }
        }
        if (isPublic) {
          document.documentElement.removeAttribute('data-theme');
          return;
        }
        var lastUser = localStorage.getItem('drivepoints-last-user');
        var stored = lastUser ? localStorage.getItem('drivepoints-theme-' + lastUser) : null;
        var theme;
        if (stored === 'light' || stored === 'dark') {
          theme = stored;
        } else if (stored === 'system') {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        } else {
          theme = 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="modal-root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
